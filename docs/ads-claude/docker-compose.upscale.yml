# docker-compose.upscale.yml
# Tambahkan service ini ke stack BeritaKarya yang sudah ada.
#
# Cara pakai:
#   docker compose -f docker-compose.yml -f docker-compose.upscale.yml up -d
#
# Atau merge isi services ini ke docker-compose.yml utama Anda.

services:

  # ─── Real-ESRGAN Upscale Microservice ─────────────────────────────────────
  upscale-service:
    build:
      context: ./upscale-service
      dockerfile: Dockerfile
    container_name: beritakarya-upscale
    restart: unless-stopped
    ports:
      - "8001:8001"        # Expose ke host jika perlu debug; hapus di production
    environment:
      MODEL_PATH: ./weights/RealESRGAN_x4plus.pth
      DEVICE: cpu          # Ganti ke 'cuda' jika server punya GPU
      MAX_FILE_MB: "20"
      OUTPUT_QUALITY: "90"
    volumes:
      # Mount weights supaya tidak perlu re-download saat rebuild image
      - upscale_weights:/app/weights
    networks:
      - beritakarya_network
    # Tidak expose ke internet — hanya dipanggil oleh service API internal
    # Pastikan 'beritakarya_network' sama dengan network di docker-compose.yml utama

  # ─── Nginx reverse proxy (opsional) ────────────────────────────────────────
  # Jika ingin upscale service hanya bisa diakses dari dalam network Docker,
  # hapus bagian 'ports' di atas dan akses via:
  #   http://upscale-service:8001/upscale  (dari container API NestJS)


volumes:
  upscale_weights:
    driver: local

networks:
  beritakarya_network:
    external: true   # Gunakan network yang sudah ada di docker-compose.yml utama
