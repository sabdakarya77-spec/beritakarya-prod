name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging..."
          echo "Images built:"
          echo "  - ghcr.io/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}"
          echo "  - ghcr.io/${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}"
          echo ""
          echo "To complete staging deployment, configure your hosting platform:"
          echo "  - Railway: railway up"
          echo "  - VPS: ssh $STAGING_HOST 'cd /app && docker compose pull && docker compose up -d'"
          echo "  - Fly.io: fly deploy"
