name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC (9 AM WIB)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Install PostgreSQL client
          sudo apt-get update && sudo apt-get install -y postgresql-client gzip

          # Create backup with timestamp
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="beritakarya_backup_${TIMESTAMP}.sql.gz"

          pg_dump "$DATABASE_URL" | gzip > "$BACKUP_FILE"

          # Verify backup is not empty
          if [ ! -s "$BACKUP_FILE" ]; then
            echo "❌ Backup file is empty!"
            exit 1
          fi

          echo "✅ Backup created: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"

          # Upload to storage (uncomment and configure one):
          # --- Option A: Supabase Storage ---
          # curl -X POST "$SUPABASE_URL/storage/v1/object/backups/$BACKUP_FILE" \
          #   -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
          #   -H "Content-Type: application/gzip" \
          #   --data-binary @"$BACKUP_FILE"

          # --- Option B: AWS S3 / R2 ---
          # aws s3 cp "$BACKUP_FILE" "s3://$S3_BUCKET/backups/$BACKUP_FILE"

          # --- Option C: Upload as GitHub Artifact (7-day retention) ---
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: beritakarya_backup_*.sql.gz
          retention-days: 7
          if-no-files-found: error

      - name: Cleanup old backups (artifact-based)
        uses: actions/github-script@v7
        with:
          script: |
            const retentionDays = 7;
            const cutoff = new Date(Date.now() - retentionDays * 24 * 60 * 60 * 1000);

            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const artifact of artifacts.artifacts) {
              if (artifact.name.startsWith('db-backup-') && new Date(artifact.created_at) < cutoff) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted old backup: ${artifact.name}`);
              }
            }
