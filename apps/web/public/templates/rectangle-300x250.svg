<svg xmlns="http://www.w3.org/2000/svg" width="300" height="250" viewBox="0 0 300 250">
  <rect width="300" height="250" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
  <!-- Safe zone -->
  <rect x="15" y="15" width="270" height="220" fill="none" stroke="#e74c3c" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="150" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">SAFE ZONE: 270 × 220 px</text>
  <!-- Center guide -->
  <line x1="150" y1="0" x2="150" y2="250" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="0" y1="125" x2="300" y2="125" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Labels -->
  <text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">RECTANGLE</text>
  <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">300 × 250 px</text>
  <text x="150" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Safe zone: 15px padding</text>
  <!-- Corner marks -->
  <text x="5" y="245" font-family="Arial, sans-serif" font-size="9" fill="#bbb">0,0</text>
  <text x="262" y="245" font-family="Arial, sans-serif" font-size="9" fill="#bbb">300,250</text>
</svg>
