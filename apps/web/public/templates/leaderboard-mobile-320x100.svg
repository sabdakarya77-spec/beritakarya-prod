<svg xmlns="http://www.w3.org/2000/svg" width="320" height="100" viewBox="0 0 320 100">
  <rect width="320" height="100" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
  <!-- Safe zone -->
  <rect x="10" y="10" width="300" height="80" fill="none" stroke="#e74c3c" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="160" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">SAFE ZONE: 300 × 80 px</text>
  <!-- Center guide -->
  <line x1="160" y1="0" x2="160" y2="100" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="0" y1="50" x2="320" y2="50" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Labels -->
  <text x="160" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">MOBILE LEADERBOARD</text>
  <text x="160" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">320 × 100 px</text>
  <text x="160" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">Safe zone: 10px padding</text>
</svg>
