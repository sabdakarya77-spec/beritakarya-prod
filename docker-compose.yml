version: '3.8'

services:
  # ---- Database ----
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: beritakarya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Cache ----
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Search ----
  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - meilidata:/meili_data

  # ---- API ----
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/beritakarya
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_HOST: http://meilisearch:7700

  # ---- Web ----
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api
    env_file:
      - apps/web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001

volumes:
  pgdata:
  meilidata:
